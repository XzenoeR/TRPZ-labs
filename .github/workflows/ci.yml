name: CI Pipeline

on:
  push:
    branches: ['main']
    tags: ['*']
  pull_request:
    branches: ['main']

permissions:
  contents: read
  packages: write

jobs:
  linting:
    name: Run Linters
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Linters
        run: pip install flake8 mypy yamllint

      - name: Run Flake8
        run: flake8 LAB1/app/app.py LAB1/app/migrate.py LAB1/tests/test_app.py --max-line-length=120

      - name: Run MyPy
        run: mypy LAB1/app/app.py LAB1/app/migrate.py --ignore-missing-imports

      - name: Run Yamllint
        run: yamllint LAB1/docker-compose.yml

      - name: Run Shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './LAB1/app'

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: LAB1/app/dockerfile
          ignore: DL3008

  testing:
    name: Run Tests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libmariadb-dev libmariadb-dev-compat

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -r LAB1/app/requirements.txt

      - name: Run Tests with Coverage
        env:
          PYTHONPATH: LAB1/app
        run: pytest LAB1/tests/test_app.py --cov=LAB1/app --cov-fail-under=40 --cov-report=xml

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  build-and-push:
    name: Build and Push Docker Image
    needs: [linting, testing]
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/mywebapp
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=sha-${{ github.sha }},enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=ref,event=tag

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./LAB1/app
          file: ./LAB1/app/dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to Target Node
    needs: build-and-push
    if: github.event_name == 'push'
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose to Target Node
        run: |
          scp -o StrictHostKeyChecking=no LAB1/docker-compose.yml vboxuser@192.168.0.212:/opt/mywebapp/

      - name: Restart application on Target Node
        run: |
          ssh -o StrictHostKeyChecking=no vboxuser@192.168.0.212 "sudo systemctl restart mywebapp.service"
