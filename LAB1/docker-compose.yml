version: '3.8'

services:
  db:
    image: mariadb:latest
    environment:
      MYSQL_DATABASE: mywebapp
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
      MYSQL_ROOT_PASSWORD: root_password_super_secret
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - notes_network
    restart: unless-stopped

  web:
    build: ./app
    depends_on:
      - db
    networks:
      - notes_network
    restart: unless-stopped

  nginx:
    image: nginx:latest
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    networks:
      - notes_network
    restart: unless-stopped

networks:
  notes_network:
    driver: bridge

volumes:
  db_data:
