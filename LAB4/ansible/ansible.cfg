[defaults]
inventory          = inventory.ini
remote_user        = ansible
private_key_file   = ~/.ssh/ansible_id_rsa
host_key_checking  = False
retry_files_enabled = False
stdout_callback    = yaml
roles_path         = roles

[privilege_escalation]
become        = True
become_method = sudo
become_user   = root
become_ask_pass = False

[ssh_connection]
pipelining = True
