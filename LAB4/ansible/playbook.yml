---
- name: Common setup for all VMs
  hosts: all
  gather_facts: true
  roles:
    - common
    - users

- name: Configure database server
  hosts: db
  gather_facts: true
  roles:
    - db

- name: Configure application server
  hosts: workers
  gather_facts: true
  roles:
    - webapp
    - nginx

- name: Configure firewall on db VM
  hosts: db
  gather_facts: true
  tasks:
    - name: Allow MariaDB only from worker IP
      community.general.ufw:
        rule: allow
        port: '3306'
        proto: tcp
        src: "{{ hostvars['worker']['ansible_host'] }}"

    - name: Deny all other connections to MariaDB port
      community.general.ufw:
        rule: deny
        port: '3306'
        proto: tcp

    - name: Ensure ufw is enabled
      community.general.ufw:
        state: enabled
        policy: deny
        direction: incoming

    - name: Allow SSH from anywhere
      community.general.ufw:
        rule: allow
        port: '22'
        proto: tcp

    - name: Create gradebook file on db VM
      ansible.builtin.copy:
        content: "24\n"
        dest: /home/student/gradebook
        owner: student
        group: student
        mode: '0644'

- name: Create gradebook file on worker VM
  hosts: workers
  gather_facts: false
  tasks:
    - name: Create gradebook file on worker VM
      ansible.builtin.copy:
        content: "24\n"
        dest: /home/student/gradebook
        owner: student
        group: student
        mode: '0644'
