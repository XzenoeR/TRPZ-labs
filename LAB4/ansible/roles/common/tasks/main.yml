---
# roles/common/tasks/main.yml
# Базові пакети та налаштування для всіх VM

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install common packages
  ansible.builtin.apt:
    name:
      - curl
      - git
      - ufw
      - python3
      - python3-pip
      - python3-venv
      - ca-certificates
      - gnupg
    state: present

- name: Set timezone to Europe/Kyiv
  community.general.timezone:
    name: Europe/Kyiv

- name: Ensure SSH service is running and enabled
  ansible.builtin.systemd:
    name: ssh
    state: started
    enabled: true

- name: Allow SSH through ufw
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Enable ufw
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming
